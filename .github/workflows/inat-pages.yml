name: Build iNaturalist GeoJSON

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'  # daily at 05:17 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build GeoJSON from iNaturalist
        env:
          PLACE_ID: "17"
          TAXON_ID: ""
          ICONIC_TAXA: "Fungi"
          QUALITY_GRADE: ""
          PER_PAGE: "200"
          MAX_PAGES: "10"
        run: python scripts/inat_to_geojson.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp output/inat-observations.geojson public/
          printf '%s\n' '<!doctype html><meta charset="utf-8"><title>iNat feed</title><p><a href="./inat-observations.geojson">inat-observations.geojson</a></p>' > public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
